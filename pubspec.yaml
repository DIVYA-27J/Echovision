name: echo_vision
description: AI-powered assistive object detection & emergency support app for visually impaired users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # Object Detection (TFLite)
  tflite_flutter: ^0.10.4
  image: ^4.1.7

  # Object Detection (Google ML Kit alternative)
  google_mlkit_object_detection: ^0.12.0

  # Text-to-Speech + Speech-to-Text
  flutter_tts: ^4.0.2
  speech_to_text: ^6.6.0

  # Location
  geolocator: ^12.0.0

  # SMS
  telephony: ^0.2.0

  # Permissions
  permission_handler: ^11.3.0

  # State Management
  provider: ^6.1.2

  # Persistent Storage
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/labels.txt
    - assets/models/mobilenet.tflite
